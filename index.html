<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>페이셀림픽 · Facelympic</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
  :root{
    --bg:#0a1428; --bg2:#10204a; --card:#15264f; --line:rgba(255,255,255,.10);
    --ink:#f2f6ff; --dim:#9fb3d8; --faint:#5f74a0;
    --cyan:#37d6ff; --cyan-deep:#0a7fb8; --lime:#9be635; --magenta:#e85cff;
    --gold:#ffd34e; --coral:#ff5d6c;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:'Pretendard',system-ui,sans-serif;background:var(--bg);color:var(--ink);
    overflow:hidden;position:fixed;inset:0;-webkit-font-smoothing:antialiased;
  }
  #app{height:100%;max-width:900px;margin:0 auto;position:relative;
    background:radial-gradient(120% 80% at 50% -10%,#16306a 0%,transparent 55%),var(--bg);}
  .screen{position:absolute;inset:0;display:none;flex-direction:column;}
  .screen.active{display:flex;}

  /* ---------- Intro ---------- */
  #intro{padding:34px 26px;justify-content:center;}
  .logo{font-size:40px;font-weight:900;letter-spacing:-.02em;line-height:1.05;margin-bottom:6px;
    background:linear-gradient(100deg,var(--cyan),var(--lime),var(--gold),var(--magenta));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .tagline{font-size:17px;color:var(--cyan);font-weight:700;margin-bottom:20px;}
  .lead{color:var(--dim);font-size:15px;line-height:1.6;margin-bottom:24px;}
  .moves{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:26px;}
  .move{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:12px 13px;}
  .move .e{font-size:24px;}
  .move b{display:block;font-size:14px;}
  .move span{font-size:12px;color:var(--faint);}
  .btn{border:none;border-radius:16px;font-family:inherit;cursor:pointer;font-weight:800;
    font-size:17px;padding:17px;width:100%;transition:transform .12s;}
  .btn:active{transform:scale(.975);}
  .btn-primary{background:linear-gradient(135deg,var(--cyan),var(--cyan-deep));color:#04243a;
    box-shadow:0 12px 32px -10px rgba(55,214,255,.6);}
  .btn-ghost{background:var(--card);color:var(--ink);border:1px solid var(--line);margin-top:10px;}
  .err{color:var(--coral);font-size:14px;margin-top:14px;text-align:center;display:none;}

  /* ---------- Calibration ---------- */
  #calib{padding:24px;align-items:center;justify-content:center;text-align:center;}
  #calib h2{font-size:24px;font-weight:800;margin-bottom:6px;}
  #calib .sub{color:var(--dim);font-size:14px;margin-bottom:18px;}
  .calvid-wrap{position:relative;width:240px;height:240px;border-radius:24px;overflow:hidden;
    border:2px solid var(--line);background:#06101f;margin-bottom:18px;}
  .calvid-wrap video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
  .cal-ring{position:absolute;inset:0;}
  .cal-cue{font-size:28px;font-weight:900;margin-bottom:6px;}
  .cal-fn{display:inline-block;font-size:14px;font-weight:800;color:#06281f;
    background:linear-gradient(135deg,var(--lime),var(--cyan));padding:5px 14px;border-radius:999px;margin-bottom:10px;}
  .cal-instr{color:var(--dim);font-size:15px;margin-bottom:16px;min-height:22px;}
  .cal-meter{width:240px;height:10px;border-radius:6px;background:rgba(255,255,255,.1);overflow:hidden;margin-bottom:18px;}
  .cal-fill{height:100%;width:0;background:linear-gradient(90deg,var(--lime),var(--cyan));transition:width .1s;}
  .cal-dots{display:flex;gap:7px;margin-bottom:8px;}
  .cal-dot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.15);}
  .cal-dot.on{background:var(--cyan);}

  /* ---------- Select (종목 선택) ---------- */
  #select{padding:24px;justify-content:center;}
  .sel-back{position:absolute;top:14px;left:14px;width:40px;height:40px;border-radius:12px;
    border:1px solid var(--line);background:var(--card);color:var(--ink);font-size:20px;cursor:pointer;}
  .sel-title{font-size:24px;font-weight:800;text-align:center;margin-bottom:20px;}
  .event-cards{display:flex;flex-direction:column;gap:14px;max-width:460px;margin:0 auto;width:100%;}
  .ev-card{display:flex;align-items:center;gap:16px;background:var(--card);border:1px solid var(--line);
    border-radius:18px;padding:18px;cursor:pointer;transition:transform .12s;}
  .ev-card:active{transform:scale(.98);}
  .ev-card.locked{opacity:.5;cursor:default;}
  .ev-emoji{font-size:38px;flex-shrink:0;width:46px;text-align:center;}
  .ev-name{font-size:20px;font-weight:800;}
  .ev-diff{color:var(--gold);font-size:15px;margin-left:6px;letter-spacing:1px;}
  .ev-sub{font-size:13px;color:var(--faint);margin-top:2px;}
  .ev-rec{font-size:14px;color:var(--cyan);font-weight:700;margin-top:5px;}
  .ev-card.locked .ev-rec{color:var(--dim);}
  .sel-err{color:var(--coral);font-size:14px;text-align:center;margin-top:14px;display:none;}

  /* ---------- Game ---------- */
  #game{padding:0;}
  #gcanvas{width:100%;height:100%;display:block;touch-action:none;}
  .g-exit{position:absolute;top:12px;left:12px;z-index:5;width:40px;height:40px;border-radius:12px;
    border:1px solid var(--line);background:rgba(8,16,32,.6);color:var(--ink);font-size:20px;cursor:pointer;
    backdrop-filter:blur(6px);}
  .g-mute{position:absolute;top:12px;left:60px;z-index:5;width:40px;height:40px;border-radius:12px;
    border:1px solid var(--line);background:rgba(8,16,32,.6);color:var(--ink);font-size:17px;cursor:pointer;
    backdrop-filter:blur(6px);}

  /* ---------- Done (훅 결과 화면) ---------- */
  #done{padding:30px 26px;align-items:center;justify-content:center;text-align:center;}
  .medal{font-size:58px;margin-bottom:0;animation:pop .5s cubic-bezier(.2,1.4,.4,1);line-height:1;}
  @keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}
  .big-time{font-size:62px;font-weight:900;letter-spacing:-.02em;line-height:1.05;margin:2px 0 6px;}
  .self-best{font-size:21px;font-weight:800;color:var(--dim);margin-bottom:2px;}
  .self-best.beat{color:var(--lime);animation:bestpop .6s cubic-bezier(.2,1.5,.4,1);}
  @keyframes bestpop{0%{transform:scale(.5);opacity:0}55%{transform:scale(1.18)}100%{transform:scale(1)}}
  .r-divider{width:100%;max-width:360px;height:1px;background:var(--line);margin:13px 0;}
  .world-rank{font-size:15px;color:var(--dim);}
  .world-rank b{color:var(--ink);font-weight:800;}
  .rk-up{color:var(--lime);font-weight:800;margin-left:5px;}
  .rk-down{color:var(--coral);font-weight:800;margin-left:5px;}
  .mission-report{font-size:14px;color:var(--dim);line-height:1.5;margin-bottom:7px;}
  .coaching{font-size:15.5px;font-weight:700;color:var(--cyan);}
  .streak-result{font-size:16px;font-weight:800;color:var(--gold);margin-top:12px;}
  .streak-top{position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:3;
    font-size:13.5px;font-weight:800;color:var(--gold);background:rgba(255,211,78,.12);
    border:1px solid rgba(255,211,78,.32);padding:6px 14px;border-radius:999px;white-space:nowrap;}

  /* loading */
  #loading{position:absolute;inset:0;z-index:50;display:none;flex-direction:column;align-items:center;
    justify-content:center;gap:16px;background:var(--bg);}
  #loading.active{display:flex;}
  .spin{width:44px;height:44px;border-radius:50%;border:3px solid rgba(255,255,255,.12);
    border-top-color:var(--cyan);animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  #loading p{color:var(--dim);font-size:14px;}
  .confetti{position:absolute;inset:0;z-index:60;pointer-events:none;display:none;}
  .confetti.on{display:block;}
</style>
</head>
<body>
<div id="app">

  <!-- INTRO -->
  <section id="intro" class="screen active">
    <div class="streak-top" id="streakIntro"></div>
    <div class="logo">페이셀림픽<br>FACELYMPIC</div>
    <div class="tagline">웃으면 빨라진다</div>
    <p class="lead">얼굴과 고개로 트랙을 질주하세요.<br>웃으면 달리고 무표정이면 멈춰요. 눈썹 올려 점프, 고개 기울여 피하고, 입으로 먹고 터뜨립니다.</p>
    <div class="moves">
      <div class="move"><span class="e">😊</span><div><b>웃기</b><span>달리기 · 부스터</span></div></div>
      <div class="move"><span class="e">😐</span><div><b>무표정</b><span>멈춤</span></div></div>
      <div class="move"><span class="e">🤨</span><div><b>눈썹 올리기</b><span>점프</span></div></div>
      <div class="move"><span class="e">↔️</span><div><b>고개 기울이기</b><span>좌우 피하기</span></div></div>
      <div class="move"><span class="e">😮</span><div><b>입 벌리기</b><span>음식 먹기</span></div></div>
      <div class="move"><span class="e">😗</span><div><b>입 오므리기</b><span>괴물 꽝!</span></div></div>
    </div>
    <button class="btn btn-primary" id="startBtn">시작하기</button>
    <p class="err" id="introErr"></p>
  </section>

  <!-- CALIBRATION -->
  <section id="calib" class="screen">
    <h2>표정·동작 익히기</h2>
    <p class="sub">5가지 동작을 따라 하며 내 얼굴을 맞춰볼게요.</p>
    <div class="calvid-wrap">
      <video id="calvid" playsinline autoplay muted></video>
    </div>
    <div class="cal-cue" id="calCue">준비</div>
    <div class="cal-fn" id="calFn" style="display:none;"></div>
    <div class="cal-instr" id="calInstr">화면 안에 얼굴을 맞춰 주세요</div>
    <div class="cal-meter"><div class="cal-fill" id="calFill"></div></div>
    <div class="cal-dots" id="calDots"></div>
    <button class="btn btn-ghost" id="calSkip" style="max-width:380px;">기본값으로 건너뛰기</button>
  </section>

  <!-- SELECT -->
  <section id="select" class="screen">
    <button class="sel-back" id="selBack">‹</button>
    <h2 class="sel-title">종목 선택</h2>
    <div class="event-cards" id="eventCards"></div>
    <p class="sel-err" id="selErr"></p>
  </section>

  <!-- GAME -->
  <section id="game" class="screen">
    <button class="g-exit" id="gExit">‹</button>
    <button class="g-mute" id="gMute">🔊</button>
    <canvas id="gcanvas"></canvas>
  </section>

  <!-- DONE -->
  <section id="done" class="screen">
    <div class="medal" id="medalEmoji">🥇</div>
    <div class="big-time" id="rTime">0.00초</div>
    <div class="self-best" id="rBest">—</div>
    <div class="r-divider"></div>
    <div class="world-rank" id="rRank"></div>
    <div class="r-divider"></div>
    <div class="mission-report" id="rReport"></div>
    <div class="coaching" id="rCoach"></div>
    <div class="streak-result" id="streakResult"></div>
    <div class="r-divider"></div>
    <button class="btn btn-primary" id="againBtn" style="max-width:380px;">다시 달리기</button>
    <button class="btn btn-ghost" id="homeBtn" style="max-width:380px;">종목 선택</button>
  </section>

  <!-- LOADING -->
  <div id="loading"><div class="spin"></div><p id="loadText">AI 모델을 불러오는 중…</p></div>
  <canvas class="confetti" id="confetti"></canvas>
</div>

<script type="module">
import { FilesetResolver, FaceLandmarker }
  from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.35/vision_bundle.mjs";

const $ = (id)=>document.getElementById(id);
const screens = { intro:$("intro"), select:$("select"), calib:$("calib"), game:$("game"), done:$("done") };
function show(n){ Object.values(screens).forEach(s=>s.classList.remove("active")); screens[n].classList.add("active"); }

// ============================================================
//  공유 상태
// ============================================================
let faceLM=null, stream=null, calVideo=$("calvid");
let detVideo=null;           // 측정에 쓰는 video 엘리먼트(인트로 캘리브와 공유)
let lastVT=-1;

// 캘리브레이션 결과: 각 신호의 min(중립)/max
const CAL = {
  smile:{min:.05,max:.7}, jaw:{min:.05,max:.6}, pucker:{min:.05,max:.5}, brow:{min:.05,max:.5},
};
function norm(sig,v){ const c=CAL[sig]; const d=Math.max(c.max-c.min,1e-3); return Math.min(1,Math.max(0,(v-c.min)/d)); }

// ============================================================
//  MediaPipe
// ============================================================
async function loadModel(){
  $("loading").classList.add("active");
  $("loadText").textContent="AI 모델을 불러오는 중…";
  const fileset = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.35/wasm");
  faceLM = await FaceLandmarker.createFromOptions(fileset,{
    baseOptions:{ modelAssetPath:
      "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
      delegate:"GPU" },
    runningMode:"VIDEO", numFaces:1, outputFaceBlendshapes:true,
  });
}
async function startCamera(videoEl){
  stream = await navigator.mediaDevices.getUserMedia({
    video:{ facingMode:"user", width:{ideal:640}, height:{ideal:480} }, audio:false });
  videoEl.srcObject = stream;
  await new Promise(res=>{ videoEl.onloadedmetadata=()=>{ videoEl.play(); res(); }; });
  detVideo = videoEl;
}
function stopCamera(){ if(stream) stream.getTracks().forEach(t=>t.stop()); stream=null; detVideo=null; }

// 신호 스무딩(EMA): 떨림·순간 오인식을 줄여 더 안정적이고 정확하게
const SM = { smile:0, jaw:0, pucker:0, roll:0, brow:0 };
const A_SLOW = 0.45;  // 연속 제어(부드럽게): 웃음(속도)·고개기울기(조향)
const A_FAST = 0.85;  // 즉각 반응(거의 실시간): 입벌리기·오므리기·눈썹
const A = { smile:A_SLOW, roll:A_SLOW, jaw:A_FAST, pucker:A_FAST, brow:A_FAST };
const SM_KEYS = ['smile','jaw','pucker','roll','brow'];
let lostFrames = 0; // 얼굴 잠깐 놓침에 대한 관용(깜빡임 방지)

// 매 프레임 blendshape + 머리자세 신호 추출
function readSignals(now){
  const out = { ok:false, smile:0, jaw:0, pucker:0, roll:0, brow:0 };
  if(!detVideo || detVideo.readyState<2) return out;
  if(detVideo.currentTime===lastVT) { out._stale=true; }
  lastVT = detVideo.currentTime;
  const res = faceLM.detectForVideo(detVideo, now);
  let raw=null;
  if(res.faceBlendshapes && res.faceBlendshapes.length){
    const m={}; for(const c of res.faceBlendshapes[0].categories) m[c.categoryName]=c.score;
    const hp = (res.faceLandmarks && res.faceLandmarks.length) ? computeHeadPose(res.faceLandmarks[0]) : {roll:SM.roll};
    raw = {
      smile : ((m.mouthSmileLeft||0)+(m.mouthSmileRight||0))/2,
      jaw   : m.jawOpen||0,
      pucker: Math.max(m.mouthPucker||0, m.mouthFunnel||0),
      brow  : ((m.browInnerUp||0)+(m.browOuterUpLeft||0)+(m.browOuterUpRight||0))/3,  // 눈썹 → 점프
      roll  : hp.roll,
    };
  }
  if(raw){
    lostFrames = 0; out.ok = true;
    for(const k of SM_KEYS){
      SM[k] += (raw[k]-SM[k])*A[k];   // 신호별 EMA(즉각 동작은 빠르게)
      out[k] = SM[k];
    }
  } else {
    // 얼굴을 잠깐(약 6프레임) 놓쳐도 직전 값 유지 → 깜빡임/끊김 방지
    if(++lostFrames < 6){ out.ok=true; for(const k of SM_KEYS) out[k]=SM[k]; }
    else { for(const k in SM) SM[k]=0; }
  }
  return out;
}

// 머리 좌우 기울기(roll) — 화살 회피. 눈 양끝(33,263) 선의 기울기
function computeHeadPose(lm){
  const eL=lm[33], eR=lm[263];
  return { roll: Math.atan2(eR.y-eL.y, eR.x-eL.x) };   // 똑바로면 ~0
}

// ============================================================
//  사운드 (Web Audio API)
// ============================================================
let actx=null, master=null, muted=false;
function initAudio(){
  if(actx) return;
  actx = new (window.AudioContext||window.webkitAudioContext)();
  master = actx.createGain(); master.gain.value=0.5; master.connect(actx.destination);
}
function tone(freq,dur,type='triangle',vol=.4,slide=0){
  if(!actx||muted) return;
  const o=actx.createOscillator(), g=actx.createGain();
  o.type=type; o.frequency.value=freq;
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(40,freq*slide), actx.currentTime+dur);
  g.gain.setValueAtTime(0.0001, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(vol, actx.currentTime+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+dur);
  o.connect(g); g.connect(master); o.start(); o.stop(actx.currentTime+dur+0.02);
}
const sfx = {
  jump:()=>tone(560,.18,'square',.35,1.8),
  land:()=>tone(180,.1,'sine',.3),
  eat:()=>tone(420,.08,'square',.3,1.2),
  break:()=>{ tone(160,.22,'sawtooth',.4,.4); tone(90,.3,'square',.3,.5); },
  dodge:()=>tone(900,.12,'sine',.3,.6),
  boost:()=>tone(300,.4,'sawtooth',.25,2.4),
  boom:()=>{ tone(140,.32,'sawtooth',.5,.32); tone(70,.42,'square',.45,.4); tone(240,.18,'sawtooth',.32,.5); },
  coin:()=>{ tone(880,.07,'square',.3); setTimeout(()=>tone(1320,.1,'square',.3),60); },
  hit:()=>{ tone(120,.25,'sawtooth',.4,.5); },
  nice:()=>{ tone(660,.08,'square',.3); setTimeout(()=>tone(990,.12,'square',.3),70); },
  go:()=>{ tone(440,.12,'square',.35); setTimeout(()=>tone(660,.2,'square',.4),140); },
};
// BGM: 속도에 따라 템포 상승하는 간단한 시퀀서
const BASS=[110,110,146,164], ARP=[440,554,659,554];
let bgmOn=false, nextNote=0, step=0;
function bgmStart(){ bgmOn=true; nextNote=actx? actx.currentTime:0; step=0; }
function bgmStop(){ bgmOn=false; }
function bgmSchedule(speed){
  if(!bgmOn||!actx||muted) return;
  const bpm = 96 + speed*7;                 // 빠를수록 신나게
  const beat = 60/bpm;
  while(nextNote < actx.currentTime + 0.12){
    const o=actx.createOscillator(), g=actx.createGain();
    o.type='triangle'; o.frequency.value=BASS[step%BASS.length];
    g.gain.setValueAtTime(.0001,nextNote); g.gain.exponentialRampToValueAtTime(.18,nextNote+.02);
    g.gain.exponentialRampToValueAtTime(.0001,nextNote+beat*.9);
    o.connect(g); g.connect(master); o.start(nextNote); o.stop(nextNote+beat);
    if(step%2===0){ const o2=actx.createOscillator(), g2=actx.createGain();
      o2.type='square'; o2.frequency.value=ARP[(step/2)%ARP.length];
      g2.gain.setValueAtTime(.0001,nextNote); g2.gain.exponentialRampToValueAtTime(.07,nextNote+.02);
      g2.gain.exponentialRampToValueAtTime(.0001,nextNote+beat*.5);
      o2.connect(g2); g2.connect(master); o2.start(nextNote); o2.stop(nextNote+beat); }
    nextNote += beat; step++;
  }
}

// ============================================================
//  캘리브레이션 진행
// ============================================================
const CAL_STEPS = [
  {key:'neutral', sig:null,     cue:'😐 무표정', fn:'멈춤 — 쉬어가기', instr:'힘을 빼면 멈춰요. 편안하게 정면을!', dur:1800},
  {key:'smile',   sig:'smile',  cue:'😄 활짝 웃기', fn:'달리기 · 부스터', instr:'웃을수록 빨라져요. 최대한 크게!', dur:2400},
  {key:'jaw',     sig:'jaw',    cue:'😮 입 벌리기 "아~"', fn:'세계 음식 먹기', instr:'입을 크게 벌려요', dur:2400},

  {key:'brow',    sig:'brow',   cue:'🤨 눈썹 올리기', fn:'점프 — 장애물 넘기', instr:'눈썹을 위로 번쩍 올려요', dur:2400},
  {key:'tilt',    sig:null, practice:'tilt', cue:'↔️ 고개 기울이기 (좌우)', fn:'화살 좌우로 피하기', instr:'고개를 좌·우로 기울여요', dur:2800},
];
let calRAF=null;
function renderCalDots(idx){
  const w=$("calDots"); w.innerHTML='';
  CAL_STEPS.forEach((_,i)=>{ const d=document.createElement('div');
    d.className='cal-dot'+(i<=idx?' on':''); w.appendChild(d); });
}
async function runCalibration(){
  show('calib');
  let idx=0;
  const neutralAcc={smile:[],jaw:[],pucker:[],brow:[]};
  function doStep(){
    const st=CAL_STEPS[idx]; renderCalDots(idx);
    $("calCue").textContent=st.cue; $("calInstr").textContent=st.instr;
    $("calFn").textContent = st.fn ? '→ '+st.fn : '';
    $("calFn").style.display = st.fn ? 'inline-block' : 'none';
    $("calFill").style.width='0%';
    let t0=performance.now(); let mx=0;
    function frame(now){
      const s=readSignals(now);
      const p=Math.min(1,(now-t0)/st.dur);
      if(st.key==='neutral'){
        if(s.ok){ neutralAcc.smile.push(s.smile); neutralAcc.jaw.push(s.jaw);
          neutralAcc.pucker.push(s.pucker); neutralAcc.brow.push(s.brow); }
        $("calFill").style.width=(p*100)+'%';
      }else if(st.sig){                  // 최대값 측정(웃음/입벌림/오므림/눈썹)
        const v=s[st.sig]||0; mx=Math.max(mx,v);
        $("calFill").style.width=Math.min(100, norm(st.sig,v)*100)+'%';
      }else if(st.practice==='tilt'){    // 기울이기 연습: 실시간 피드백(측정X)
        $("calFill").style.width=Math.min(100, Math.abs(s.roll||0)/0.4*100)+'%';
      }
      if(p>=1){
        if(st.key==='neutral'){
          const avg=a=>a.length?a.reduce((x,y)=>x+y,0)/a.length:.05;
          for(const k of ['smile','jaw','pucker','brow']) CAL[k].min=Math.max(.03, avg(neutralAcc[k])+.02);
        }else if(st.sig){
          CAL[st.sig].max=Math.max(CAL[st.sig].min+0.08, mx*0.85); // 살짝 여유
        }
        sfx.coin();
        idx++;
        if(idx>=CAL_STEPS.length){ calibrated=true; startGame(); return; }
        setTimeout(doStep,300); return;
      }
      calRAF=requestAnimationFrame(frame);
    }
    calRAF=requestAnimationFrame(frame);
  }
  doStep();
}

let TARGET=130;          // 현재 종목 트랙 길이(m) — startGame에서 종목별로 설정
const VIEW=42;           // 오브젝트 보이는 거리(m)
const ACT=20;            // 액션 경고 큐가 뜨는 거리(m)
const FINISH_VIEW=72;    // 결승 테이프가 멀리서부터 보이는 거리(m)
// 명중 거리는 속도 비례(G.hitDist, gameLoop서 계산) — 반응시간을 항상 ~1초로 유지

// 종목 3종 — 길이가 아니라 성격으로 구분. 선택/해금은 작업 2.
// mix = 미션 배분(food:monster:arrow + 점프용 hurdle 가볍게). 기록 단위는 '초' 유지.
const EVENTS = [
  // foodBoost=미션 임팩트(부스터/감속 강도 기준), penalty=실패 감속배율, foods=음식 종류
  { id:'sprint', name:'단거리', emoji:'⚡', dist:200, gold:17, silver:23, mix:{food:2,monster:2,arrow:2,hurdle:1},
    foodBoost:5.0, penalty:0.40, foods:['🍔','🍗'] },                                // 폭발: 한 방이 큼
  { id:'middle', name:'중거리', emoji:'🎵', dist:500, gold:43, silver:56, mix:{food:4,monster:4,arrow:4,hurdle:2},
    foodBoost:3.2, penalty:0.50, foods:['🍔','🍗'] },                                // 리듬: 음식 콤보
  { id:'long',   name:'장거리', emoji:'🔥', dist:1000, gold:85, silver:110, mix:{food:6,monster:6,arrow:7,hurdle:4},
    foodBoost:2.6, penalty:0.58, foods:['🍔','🍗','🍕','🍣','🥟','🌮','🍜','🥨'] },   // 변화: 나라별 음식
];
let curEvent = EVENTS[0];   // 작업 1: 단거리 고정 (선택화면은 작업 2)

// 시드 기반 난수(LCG) — 매판 변주 / 오늘의 트랙(작업 4)
function makeRng(seed){ let s=(seed>>>0)||1; return function(){ s=(s*1664525+1013904223)>>>0; return s/4294967296; }; }
let G;                   // 게임 상태

// 깊이 d(0=플레이어, 1=먼곳) → 화면 투영 계수
function f(d){ return (1-d)/(1+3*d); }   // 1(near)..0(far)

// 종목 mix + 시드로 미션 배치를 매판 다르게 (순서 셔플 + 위치 지터)
function makeObstacles(ev, seed){
  const rng=makeRng(seed);
  const pool=[];
  for(const t in ev.mix){ for(let k=0;k<ev.mix[t];k++) pool.push(t); }
  // Fisher–Yates 셔플(시드) → 같은 종목도 이번엔 화살 먼저, 다음엔 음식 먼저
  for(let i=pool.length-1;i>0;i--){ const j=Math.floor(rng()*(i+1)); const tmp=pool[i]; pool[i]=pool[j]; pool[j]=tmp; }
  const n=pool.length, startD=14, endD=Math.max(startD+1, ev.dist-12), span=endD-startD;
  const arr=[];
  for(let i=0;i<n;i++){
    const slot=startD + span*(i+0.5)/n;          // 균등 슬롯
    const at=slot + (rng()-0.5)*(span/n)*0.7;     // 간격 지터
    const type=pool[i];
    arr.push({ type, at, lane: 0,   // 화살 포함 모두 중앙(정면)으로 — 좌우로 비켜 회피
      resolved:false, charge:0, bites:0, result:null });
  }
  return arr;
}

function startGame(){
  show('game'); resize(); initAudio(); if(actx.state==='suspended') actx.resume();
  TARGET = curEvent.dist;                          // 종목별 트랙 길이
  const seed = Math.floor(Math.random()*1e9);      // 매판 다른 배치(작업 4: 오늘의 트랙 시드)
  G = {
    dist:0, speed:4, px:0, py:0, vy:0, grounded:true, sN:0, boosting:false,
    jumpReady:true, hitDist:9, fx:[], pops:[],
    obstacles:makeObstacles(curEvent, seed),
    raceTime:0, hits:0, foodCombo:0, tally:{hurdle:0,arrow:0,food:0,monster:0},
    flash:null, flashT:0, shake:0, cue:null, feed:null, feedT:0, slow:1,
    running:true, t:performance.now(), started:false, countdown:3.0,
  };
  bgmStart(); sfx.go();
  const myGen=++loopGen;
  requestAnimationFrame((t)=>gameLoop(t,myGen));
}
let loopGen=0;


function setFeed(txt,col){ G.feed=txt; G.feedColor=col; G.feedT=0.9; }
function setFlash(col){ G.flash=col; G.flashT=0.25; }

function activeObstacle(){
  let best=null;
  for(const o of G.obstacles){
    if(o.resolved) continue;
    const ahead=o.at-G.dist;
    if(ahead>0 && ahead<ACT){ if(!best || ahead<(best.at-G.dist)) best=o; }
  }
  return best;
}

// 성공/실패 팝업 텍스트(오브젝트 위치에서 떠올라 사라짐)
function spawnPop(x,y,text,color){ if(G&&G.pops) G.pops.push({x,y,text,color,life:1,vy:-42}); }

// 괴물 격파 폭발 입자 생성
function spawnBoom(x,y){
  const cols=['#ff7a30','#ffd34e','#ff5d6c','#fff2a0'];
  for(let i=0;i<28;i++){ const a=Math.random()*Math.PI*2, sp=90+Math.random()*230;
    G.fx.push({ x, y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-70,
      life:0.7+Math.random()*0.45, size:3+Math.random()*5, color:cols[i%cols.length] }); }
}

function resolve(o){
  o.resolved=true;
  let ok=false;
  if(o.type==='hurdle') ok = !G.grounded;
  else if(o.type==='arrow') ok = Math.abs(G.px) > 0.4;   // 중앙으로 오는 화살 — 좌우 어느 쪽이든 비키면 회피
  else if(o.type==='monster') ok = o.charge>=1; // 입 오므리기 1회로 격파
  else if(o.type==='food') ok = o.bites>=1;     // 입 벌리기 1회로 먹기
  o.result=ok;
  const sx = o._sx||cssW/2, sy = o._sy||cssH*0.5;
  const B=curEvent.foodBoost;            // 종목별 미션 임팩트 기준
  if(ok){
    G.hits++; G.tally[o.type]++;
    // 미션 성공 = 물리적 이득(전진 부스트). 점수 없음 → 빨라져서 기록이 좋아짐
    let fwd, pop, popCol='#9be635';
    if(o.type==='food'){
      G.foodCombo++;
      fwd = B * (1 + (G.foodCombo-1)*0.4);                 // 연속으로 먹을수록 커지는 콤보 부스터
      pop = G.foodCombo>1 ? '🍔 콤보 ×'+G.foodCombo+'!' : '🍔 냠냠!';
      if(G.foodCombo>1) popCol='#ffd34e';
    } else if(o.type==='monster'){ fwd=B*2.6; pop='💥 꽝!'; }
    else if(o.type==='arrow'){ fwd=B*0.8; pop='↔️ 피함!'; }
    else { fwd=B*0.8; pop='⬆️ 점프!'; }
    G.dist += fwd; G.speed = Math.min(20, G.speed + (o.type==='monster'?5:2));
    spawnPop(sx, sy, pop, popCol);
    setFlash('rgba(110,235,90,.28)');
    if(o.type==='monster'){ sfx.boom(); spawnBoom(sx,sy); G.shake=16; setFlash('rgba(255,170,50,.35)'); }
    else if(o.type==='food'){ sfx.coin(); }
    else if(o.type==='arrow'){ sfx.dodge(); }
    else { sfx.nice(); }
  }else{
    // 미션 실패 = 물리적 손해(감속). 점수 페널티 없음 → 느려져서 기록이 나빠짐
    const FAILTXT={ monster:'👹 막힘!', food:'놓침', arrow:'🏹 맞음!', hurdle:'🚧 쿵!' };
    spawnPop(sx, sy, FAILTXT[o.type]||'실패', o.type==='food'?'#9fb3d8':'#ff5d6c');
    if(o.type==='food'){ G.foodCombo=0; }                  // 음식 놓치면 콤보 끊김
    else { G.speed=Math.max(3, G.speed*curEvent.penalty); setFlash('rgba(255,80,90,.32)'); G.shake=12; sfx.hit(); }  // 종목별 감속
  }
}

function gameLoop(now, gen){
  if(!G || !G.running || gen!==loopGen) return;
  const dt=Math.min(.05,(now-G.t)/1000); G.t=now;
  const sig=readSignals(now);

  // ---- 카운트다운 ----
  if(!G.started){
    G.countdown-=dt;
    drawScene(sig, 0);
    drawCountdown(Math.ceil(G.countdown));
    if(G.countdown<=0){ G.started=true; }
    requestAnimationFrame((t)=>gameLoop(t,gen)); return;
  }

  const act = activeObstacle();
  G.raceTime += dt;          // 기록 = 완주 시간(유일한 지표)

  // ---- 속도(연속): 무표정=멈춤, 웃을수록 빨라짐 ----
  const sN = sig.ok? norm('smile',sig.smile):0;
  const STOP_TH=0.08, MOVE_MIN=6, MAXSP=19;
  let targetSpeed;
  if(sN < STOP_TH) targetSpeed = 0;                                  // 무표정 = 멈춤
  else targetSpeed = MOVE_MIN + Math.pow((sN-STOP_TH)/(1-STOP_TH),0.8)*(MAXSP-MOVE_MIN);
  // 입을 쓰는 미션(먹기/괴물) 중엔 입이 막혀 못 웃으니 멈추지 않게 살짝 코스트
  if(act && (act.type==='food'||act.type==='monster')) targetSpeed=Math.max(targetSpeed,6);
  G.sN = sN; G.boosting = sN>0.62;
  if(G.boosting && targetSpeed>G.speed+2 && Math.random()<.05) sfx.boost();
  G.speed += (targetSpeed-G.speed)*Math.min(1,dt*6);   // 반응 더 빠르게

  // ---- 좌우 이동(화살 회피): 고개 기울이기(roll) ----
  const ROLL_SIGN=-1, deadR=0.10;       // rad(~6°). 좌우 반대면 부호 뒤집기(현재 -1)
  const roll = sig.roll*ROLL_SIGN;
  let tx = Math.abs(roll)>deadR ? Math.max(-1,Math.min(1,roll*4.5)) : 0;
  if(!(act && act.type==='arrow')) tx=tx*0.45; // 회피 구간 아니면 약하게
  G.px += (tx-G.px)*Math.min(1,dt*9);

  // ---- 점프: 눈썹 올리기(brow). 웃을 때 눈썹이 같이 올라가는 오발동 방지 → 웃음 성분 빼기 ----
  const BROW_TH=0.55, SMILE_SUPPRESS=0.5;          // 오발동 잦으면 BROW_TH↑ 또는 SMILE_SUPPRESS↑
  const browEff = (sig.ok ? norm('brow', sig.brow) : 0) - sN*SMILE_SUPPRESS;  // 웃음 강하면 상쇄
  if(G.jumpReady && browEff>BROW_TH && G.grounded){
    G.vy=10.8; G.grounded=false; G.jumpReady=false; sfx.jump();
  }
  if(browEff<0.2) G.jumpReady=true;                // 눈썹 내리면 다음 점프 준비
  if(!G.grounded){ G.vy-=20*dt; G.py+=G.vy*dt; if(G.py<=0){ G.py=0; G.grounded=true; G.vy=0; sfx.land(); } }

  // ---- 폭발 입자 + 결과 팝업 업데이트 ----
  for(let i=G.fx.length-1;i>=0;i--){ const p=G.fx[i];
    p.vy+=40*dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt*1.6;
    if(p.life<=0) G.fx.splice(i,1); }
  for(let i=G.pops.length-1;i>=0;i--){ const p=G.pops[i];
    p.y+=p.vy*dt; p.vy*=0.9; p.life-=dt*1.2;
    if(p.life<=0) G.pops.splice(i,1); }

  // ---- 먹기/괴물: 명중 거리 속도 비례(반응 ~1초) + 관대한 판정 ----
  // 가까울 때 해당 표정을 '짓고 있으면' 처리 → 미리 짓고 기다려도, 도착할 때 지어도 OK
  G.hitDist = Math.min(18, Math.max(8, G.speed*0.9));
  if(sig.ok && act && !act.resolved && (act.at-G.dist) < G.hitDist){
    if(act.type==='food'    && norm('jaw',   sig.jaw)    > 0.45){ act.bites=1;  resolve(act); }
    if(act.type==='monster' && norm('pucker',sig.pucker) > 0.45){ act.charge=1; resolve(act); }
  }

  // ---- 전진 & 판정 ----
  G.dist += G.speed*dt;
  for(const o of G.obstacles){ if(!o.resolved && (o.at-G.dist)<=0.5) resolve(o); }

  // ---- 타이머 감쇠 ----
  if(G.flashT>0) G.flashT-=dt; if(G.shake>0) G.shake=Math.max(0,G.shake-dt*40);
  if(G.feedT>0) G.feedT-=dt;

  bgmSchedule(G.speed);
  drawScene(sig, G.speed);

  // ---- 종료 ----
  if(G.dist>=TARGET){ finish(); return; }
  requestAnimationFrame((t)=>gameLoop(t,gen));
}

const ICON = { hurdle:'🚧', monster:'👹' };   // 음식은 종목별 curEvent.foods 사용
function drawScene(sig, speed){
  const W=cssW,H=cssH, cx=W/2, horizon=H*0.40;
  let sx=0,sy=0; if(G && G.shake>0){ sx=(Math.random()-.5)*G.shake; sy=(Math.random()-.5)*G.shake; }
  ctx.save(); ctx.translate(sx,sy);

  // 하늘
  const sky=ctx.createLinearGradient(0,0,0,horizon); sky.addColorStop(0,'#1a4fb0'); sky.addColorStop(1,'#7cc6ff');
  ctx.fillStyle=sky; ctx.fillRect(-20,-20,W+40,horizon+20);
  // 먼 산 (패럴럭스 느림)
  const off1=(G?G.dist:0)*6;
  ctx.fillStyle='#3a5a86';
  drawHills(W,horizon,off1,42,horizon-40);
  ctx.fillStyle='#2f4a72';
  drawHills(W,horizon,off1*1.7,30,horizon-12);

  // 바닥(잔디)
  ctx.fillStyle='#15351f'; ctx.fillRect(-20,horizon,W+40,H-horizon+20);

  // 트랙 (사다리꼴 + 스크롤 스트라이프)
  const bottomHalf=W*0.46, topHalf=W*0.045;
  const xL=d=> cx - (topHalf + (bottomHalf-topHalf)*f(d));
  const xR=d=> cx + (topHalf + (bottomHalf-topHalf)*f(d));
  const yD=d=> horizon + (H-horizon)*f(d);
  const SEG=16, phase=(G?G.dist:0)*0.55;
  for(let i=0;i<SEG;i++){
    const d0=i/SEG, d1=(i+1)/SEG;
    const y0=yD(d0), y1=yD(d1);
    const band=Math.floor(phase+i*1.0)%2===0;
    ctx.fillStyle = band? '#1ea6e0':'#178ec2';
    ctx.beginPath(); ctx.moveTo(xL(d0),y0); ctx.lineTo(xR(d0),y0); ctx.lineTo(xR(d1),y1); ctx.lineTo(xL(d1),y1); ctx.closePath(); ctx.fill();
  }
  // 트랙 가장자리 빛
  ctx.strokeStyle='rgba(120,235,255,.9)'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(xL(0),yD(0)); ctx.lineTo(xL(1),yD(1)); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(xR(0),yD(0)); ctx.lineTo(xR(1),yD(1)); ctx.stroke();
  // 중앙 차선
  ctx.strokeStyle='rgba(255,255,255,.35)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(cx,yD(0)); ctx.lineTo(cx,yD(1)); ctx.stroke();

  // 오브젝트 (먼 것부터)
  if(G){
    const list=G.obstacles.filter(o=>!o.resolved && (o.at-G.dist)>0 && (o.at-G.dist)<VIEW)
                          .sort((a,b)=>(b.at-G.dist)-(a.at-G.dist));
    for(const o of list){
      const ahead=o.at-G.dist, d=Math.max(0,Math.min(1,ahead/VIEW));
      const ff=f(d);
      const roadHalf=topHalf+(bottomHalf-topHalf)*ff;
      const ox=cx + o.lane*roadHalf*0.7;
      const oy=yD(d);
      const sc=0.5+ff*2.6;
      o._sx=ox; o._sy=oy;   // 즉시 격파 시 폭발 위치로 사용
      if(o.type==='arrow'){
        drawArrow(ox, oy-14*sc, sc);
      } else {
        const em = o.type==='food'? curEvent.foods[(o.at|0)%curEvent.foods.length] : ICON[o.type];
        ctx.font=`${Math.round(30*sc)}px serif`; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
        ctx.fillText(em, ox, oy);
      }
    }
  }

  // 결승 테이프 (멀리서부터 보임)
  if(G){
    const fa = TARGET - G.dist;
    if(fa>0 && fa<FINISH_VIEW){
      const dd=Math.min(1, fa/VIEW), ff2=f(dd), yy=yD(dd);
      const hw=topHalf+(bottomHalf-topHalf)*ff2;
      const lx=cx-hw, rx=cx+hw, postH=48*ff2+8, tapeY=yy-postH;
      // 체커 바닥선
      const cells=10, cw=(2*hw)/cells, ch=4+ff2*16;
      for(let i=0;i<cells;i++){ ctx.fillStyle=i%2?'#10141c':'#f2f6ff'; ctx.fillRect(lx+i*cw, yy-ch/2, cw+1, ch); }
      // 기둥
      ctx.fillStyle='#e0473a'; ctx.fillRect(lx-3,tapeY,6,postH); ctx.fillRect(rx-3,tapeY,6,postH);
      // 테이프(끊는 리본)
      ctx.strokeStyle='#ffe14d'; ctx.lineWidth=3+5*ff2;
      ctx.beginPath(); ctx.moveTo(lx,tapeY+5); ctx.lineTo(rx,tapeY+5); ctx.stroke();
      // 🏁 FINISH
      ctx.fillStyle='#fff'; ctx.font=`900 ${Math.round(11+ff2*22)}px Pretendard`; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
      ctx.fillText('🏁 FINISH', cx, tapeY-7);
    }
  }

  // 플레이어
  if(G){
    const footY=yD(0)-4 - G.py*52;
    const pxs=cx + G.px*bottomHalf*0.62;
    // 그림자
    ctx.fillStyle='rgba(0,0,0,.32)'; ctx.beginPath();
    ctx.ellipse(pxs, yD(0)-4, 30-G.py*8, 10, 0,0,7); ctx.fill();
    drawRunner(pxs, footY, G.dist);
  }

  // 속도선(부스터)
  if(speed>11){
    ctx.strokeStyle='rgba(255,255,255,'+Math.min(.5,(speed-11)/8)+')'; ctx.lineWidth=2;
    for(let i=0;i<10;i++){ const a=Math.random()*Math.PI*2, r1=40+Math.random()*60, r2=r1+30+speed*4;
      ctx.beginPath(); ctx.moveTo(cx+Math.cos(a)*r1, horizon+Math.sin(a)*r1*0.7);
      ctx.lineTo(cx+Math.cos(a)*r2, horizon+Math.sin(a)*r2*0.7); ctx.stroke(); }
  }
  ctx.restore();

  // 플래시
  if(G && G.flashT>0){ ctx.fillStyle=G.flash; ctx.globalAlpha=Math.min(1,G.flashT/0.25); ctx.fillRect(0,0,W,H); ctx.globalAlpha=1; }

  // 폭발 입자(꽝)
  if(G && G.fx.length){
    for(const p of G.fx){ ctx.globalAlpha=Math.max(0,Math.min(1,p.life));
      ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,7); ctx.fill(); }
    ctx.globalAlpha=1;
  }
  // 성공/실패 결과 팝업
  if(G && G.pops.length){
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.font='900 27px Pretendard';
    ctx.shadowColor='rgba(0,0,0,.6)'; ctx.shadowBlur=8;
    for(const p of G.pops){ ctx.globalAlpha=Math.max(0,Math.min(1,p.life*1.4));
      ctx.fillStyle=p.color; ctx.fillText(p.text, p.x, p.y); }
    ctx.shadowBlur=0; ctx.globalAlpha=1;
  }

  // HUD
  drawHUD(W,H,sig);

  // 중앙 액션 큐
  if(G){
    const act=activeObstacle();
    if(act){ const ahead=act.at-G.dist; if(ahead<ACT){ drawCue(act, W,H, ahead<G.hitDist); } }
    if(G.feedT>0){ drawFeed(W,H); }
  }
}
function drawHills(W,h,off,amp,base){
  ctx.beginPath(); ctx.moveTo(-20,h+20);
  const step=60; let x=-20-(off%step);
  ctx.lineTo(x,base);
  for(; x<W+80; x+=step){ const y=base - Math.abs(Math.sin(x*0.01+off*0.002))*amp; ctx.lineTo(x,y); }
  ctx.lineTo(W+20,h+20); ctx.closePath(); ctx.fill();
}
// 날아오는 화살 (아래=플레이어 쪽을 향함)
function drawArrow(x,y,sc){
  ctx.save(); ctx.translate(x,y);
  const L=24*sc, w=8*sc;
  ctx.strokeStyle='#b9381f'; ctx.lineWidth=Math.max(2,4*sc); ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(0,-L); ctx.lineTo(0,L*0.45); ctx.stroke();        // 화살대
  ctx.fillStyle='#e74c3c';                                                       // 화살촉(아래)
  ctx.beginPath(); ctx.moveTo(0,L); ctx.lineTo(-w,L*0.35); ctx.lineTo(w,L*0.35); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#f5c451';                                                       // 깃(위)
  ctx.beginPath(); ctx.moveTo(0,-L); ctx.lineTo(-w*0.95,-L*0.62); ctx.lineTo(0,-L*0.5); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(0,-L); ctx.lineTo(w*0.95,-L*0.62); ctx.lineTo(0,-L*0.5); ctx.closePath(); ctx.fill();
  ctx.restore();
}

// 러너 캐릭터 (발 위치 = x,y 기준, 위로 그림)
function drawRunner(x,y,dist){
  const bob=Math.sin(dist*2.6)*2.5;
  const ph=Math.sin(dist*9), arm=Math.sin(dist*9+Math.PI);
  ctx.save(); ctx.translate(x,y+bob); ctx.lineCap='round';
  // 다리
  ctx.strokeStyle='#13294d'; ctx.lineWidth=11;
  ctx.beginPath(); ctx.moveTo(0,-30); ctx.lineTo(10*ph,-2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,-30); ctx.lineTo(-10*ph,-2); ctx.stroke();
  // 신발
  ctx.strokeStyle='#ff5d6c'; ctx.lineWidth=6;
  ctx.beginPath(); ctx.moveTo(10*ph,-2); ctx.lineTo(10*ph+7,-1); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-10*ph,-2); ctx.lineTo(-10*ph-7,-1); ctx.stroke();
  // 뒤쪽 팔
  ctx.strokeStyle='#1488c4'; ctx.lineWidth=9;
  ctx.beginPath(); ctx.moveTo(0,-56); ctx.lineTo(-15,-40-10*arm); ctx.stroke();
  // 몸통(유니폼)
  const g=ctx.createLinearGradient(0,-62,0,-26); g.addColorStop(0,'#46e0ff'); g.addColorStop(1,'#1488c4');
  ctx.fillStyle=g; roundRect(-14,-64,28,38,12); ctx.fill();
  // 등번호
  ctx.fillStyle='#eaf9ff'; ctx.font='900 15px Pretendard'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('1',0,-45);
  // 앞쪽 팔
  ctx.strokeStyle='#37d6ff'; ctx.lineWidth=9;
  ctx.beginPath(); ctx.moveTo(0,-56); ctx.lineTo(15,-40+10*arm); ctx.stroke();
  // 머리
  ctx.fillStyle='#ffd9a8'; ctx.beginPath(); ctx.arc(0,-78,15,0,7); ctx.fill();
  // 헤어밴드(머리에 클립)
  ctx.save(); ctx.beginPath(); ctx.arc(0,-78,15,0,7); ctx.clip();
  ctx.fillStyle='#ff5d6c'; ctx.fillRect(-15,-90,30,8); ctx.restore();
  // 눈
  ctx.fillStyle='#13294d'; ctx.beginPath(); ctx.arc(-5,-77,2.4,0,7); ctx.fill();
  ctx.beginPath(); ctx.arc(6,-77,2.4,0,7); ctx.fill();
  ctx.restore();
}
function drawHUD(W,H,sig){
  // 거리
  ctx.fillStyle='#fff'; ctx.font='800 22px Pretendard'; ctx.textAlign='left'; ctx.textBaseline='top';
  ctx.fillText((G?Math.floor(G.dist):0)+'m', 16, 14);
  // 속도 게이지 + 코칭(웃음→속도)
  const gw=120, gh=9, gx=16, gy=44;
  const spN = G? Math.max(0,Math.min(1, G.speed/19)) : 0;
  const stopped = G && G.speed<1.5;
  const gcol = stopped? '#9fb3d8' : (G&&G.boosting? '#ffd34e' : (G&&G.speed>8? '#37d6ff':'#9be635'));
  ctx.fillStyle='rgba(255,255,255,.18)'; roundRect(gx,gy,gw,gh,5); ctx.fill();
  ctx.fillStyle=gcol; roundRect(gx,gy, gw*spN, gh,5); ctx.fill();
  ctx.fillStyle=gcol; ctx.font='800 12px Pretendard'; ctx.textAlign='left'; ctx.textBaseline='top';
  ctx.fillText(stopped?'😐 멈춤 · 웃으면 출발':(G&&G.boosting?'🔥 부스터!':(G&&G.speed>8?'🏃 달리는 중':'😊 웃는 중')), gx, gy+13);
  // 진행 바
  const bx=W*0.30, bw=W*0.40, by=22, bh=10;
  ctx.fillStyle='rgba(255,255,255,.2)'; roundRect(bx,by,bw,bh,5); ctx.fill();
  ctx.fillStyle='#37d6ff'; roundRect(bx,by, bw*Math.min(1,(G?G.dist:0)/TARGET), bh,5); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='700 13px Pretendard'; ctx.textAlign='right'; ctx.textBaseline='top';
  ctx.fillText(TARGET+'m', bx+bw+44, 14); ctx.textAlign='left'; ctx.fillText(curEvent.emoji+' '+curEvent.name, bx-78, 14);
  // 기록 타이머 (유일한 지표)
  ctx.textAlign='right'; ctx.textBaseline='top';
  ctx.fillStyle='#ffd34e'; ctx.font='900 30px Pretendard';
  ctx.fillText((G?G.raceTime:0).toFixed(2), W-16, 11);
  ctx.fillStyle='#9fb3d8'; ctx.font='700 13px Pretendard';
  ctx.fillText('초', W-16, 45);

  // 미니 웹캠 PIP
  const pw=92,ph=72, px=W-pw-12, py=H-ph-12;
  ctx.save(); roundRect(px,py,pw,ph,10); ctx.clip();
  if(detVideo){ ctx.translate(px+pw,py); ctx.scale(-1,1); ctx.drawImage(detVideo,0,0,pw,ph); }
  ctx.restore();
  ctx.strokeStyle=sig.ok?'#9be635':'#5f74a0'; ctx.lineWidth=2; roundRect(px,py,pw,ph,10); ctx.stroke();
  ctx.fillStyle=sig.ok?'#9be635':'#5f74a0'; ctx.beginPath(); ctx.arc(px+10,py+10,4,0,7); ctx.fill();
  if(!sig.ok){ ctx.fillStyle='rgba(255,255,255,.85)'; ctx.font='700 12px Pretendard'; ctx.textAlign='center';
    ctx.fillText('얼굴이 안 보여요',W/2,H*0.5); }
}
const CUE_TXT={ hurdle:['JUMP!','눈썹 올려 점프!'], arrow:['피해!','고개 기울여 피하기'],
  food:['냠냠!','입 벌려 먹기'], monster:['후~!','입 오므려 꽝!'] };
function drawCue(o,W,H,now){
  const [big,sub]=CUE_TXT[o.type];

function drawFeed(W,H){

function drawCountdown(n){

function roundRect(x,y,w,h,r){ ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

// 기록 저장 (자기최고 시간)
function bestKey(){ return 'fl_best_'+curEvent.id; }   // 종목별 자기최고
function loadBest(){ try{ const v=localStorage.getItem(bestKey()); return v?parseFloat(v):null; }catch(e){ return null; } }
function saveBest(t){ try{ localStorage.setItem(bestKey(), t.toFixed(2)); }catch(e){} }
function medalFor(t){ return t<curEvent.gold?'🥇':(t<curEvent.silver?'🥈':'🥉'); }  // 종목 기준 시간

// ----- 연속 도전일(streak) = 투자. 끊겨도 응원 톤 -----
function lsGet(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
function lsSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
function dayStr(d){ return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate(); }
function todayStr(){ return dayStr(new Date()); }
function yesterdayStr(){ const d=new Date(); d.setDate(d.getDate()-1); return dayStr(d); }
function currentStreak(){       // 표시용(쓰기X): 어제/오늘 기록 있으면 살아있음
  const n=parseInt(lsGet('fl_streak')||'0',10)||0;
  const last=lsGet('fl_lastDay');
  return (last===todayStr()||last===yesterdayStr()) ? n : 0;
}
function markPlayedToday(){      // 완주 시 호출: 오늘 첫 플레이면 streak 갱신
  let n=parseInt(lsGet('fl_streak')||'0',10)||0;
  const last=lsGet('fl_lastDay'), today=todayStr();
  if(last===today){}                       // 오늘 이미 카운트됨
  else if(last===yesterdayStr()){ n+=1; }  // 연속
  else { n=1; }                            // 첫날 또는 끊김 → 다시 1일째
  lsSet('fl_streak',String(n)); lsSet('fl_lastDay',today);
  return n;
}
function updateStreakIntro(){
  const el=$("streakIntro"); if(!el) return;
  const s=currentStreak();
  el.textContent = s>=1 ? '🔥 '+s+'일 연속 도전 중' : '🌱 오늘, 한 판 어때요?';
}

function missionTotals(){
  const tot={hurdle:0,arrow:0,food:0,monster:0};
  G.obstacles.forEach(o=>tot[o.type]++); return tot;
}
function missionReport(){
  const tot=missionTotals(), parts=[];
  if(tot.food)    parts.push('😮 음식 '+G.tally.food+'/'+tot.food);
  if(tot.monster) parts.push('👹 괴물 '+G.tally.monster+'/'+tot.monster);
  if(tot.hurdle)  parts.push('🙇 허들 '+G.tally.hurdle+'/'+tot.hurdle);
  if(tot.arrow){ const m=tot.arrow-G.tally.arrow; parts.push('↔️ 화살 '+(m>0? m+'회 피격':'완벽')); }
  return parts.join('  ·  ');
}
function coachingLine(){            // 점수 아님 — "이걸 깨면 더 빠르다"는 재도전 유도
  const tot=missionTotals();
  const miss={ arrow:tot.arrow-G.tally.arrow, monster:tot.monster-G.tally.monster,
               hurdle:tot.hurdle-G.tally.hurdle, food:tot.food-G.tally.food };
  const phrase={ arrow:'화살만 피했다면', monster:'괴물만 처치했다면', hurdle:'허들만 넘었다면', food:'음식만 먹었다면' };
  let worst=null, wn=0;
  for(const k of ['arrow','monster','hurdle','food']) if(miss[k]>wn){ wn=miss[k]; worst=k; }
  if(!worst) return '거의 최선이었어요! 완벽한 질주 👏';
  return phrase[worst]+' 더 빨랐어요 (−'+(wn*0.4).toFixed(1)+'초)';
}
function fakeRank(t){               // 더미 세계순위(작업 6에서 실제 연동). 빠를수록 상위.
  return { rank:Math.max(1, Math.round(t*28)+372), up:40+Math.round((t*7)%170) };
}

function finish(){
  G.running=false; bgmStop();
  const t=G.raceTime;
  const prevBest=loadBest();
  const isBest=(prevBest==null || t<prevBest);
  if(isBest) saveBest(t);

  $("medalEmoji").textContent=medalFor(t);
  $("rTime").textContent=t.toFixed(2)+'초';

  const bestEl=$("rBest");
  if(isBest){
    bestEl.textContent = (prevBest==null) ? '첫 기록! 🎉' : '🎉 자기최고! ↓'+(prevBest-t).toFixed(2)+'초';
    bestEl.className='self-best beat';
  }else{
    bestEl.textContent = '이전 최고 '+prevBest.toFixed(2)+'초 (+'+(t-prevBest).toFixed(2)+')';
    bestEl.className='self-best';
  }

  const rk=fakeRank(t);
  $("rRank").innerHTML='전 세계 <b>'+rk.rank.toLocaleString()+'등</b> <span class="rk-up">↑'+rk.up+'</span>';
  $("rReport").textContent=missionReport();
  $("rCoach").textContent=coachingLine();

  const streak=markPlayedToday();
  $("streakResult").textContent = streak<=1 ? '🌱 '+streak+'일째 시작! 내일 또 만나요'
                                            : '🔥 연속 '+streak+'일째!';

  show('done');
  if(isBest) fireConfetti();      // 자기최고 경신 시에만 축하
}

// 폭죽 (숨-핏 패턴)
const cfc=$("confetti"), cfx=cfc.getContext('2d'); let cfRAF=null;
const CFCOL=['#37d6ff','#9be635','#ffd34e','#e85cff','#ff5d6c'];
function fireConfetti(){
  cfc.classList.add('on');
  const dpr=Math.min(2,window.devicePixelRatio||1);
  const w=cfc.width=innerWidth*dpr, h=cfc.height=innerHeight*dpr;
  cfc.style.width=innerWidth+'px'; cfc.style.height=innerHeight+'px';
  const parts=[]; const burst=(cxp,cyp)=>{ const n=40+Math.random()*20, base=CFCOL[Math.floor(Math.random()*CFCOL.length)];
    for(let i=0;i<n;i++){ const a=(Math.PI*2*i)/n+Math.random()*.3, sp=(2+Math.random()*4.5)*dpr;
      parts.push({x:cxp,y:cyp,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
        color:Math.random()<.3?CFCOL[Math.floor(Math.random()*CFCOL.length)]:base,life:1,size:(1.6+Math.random()*2.4)*dpr}); } };
  burst(w*.35,h*.3); burst(w*.65,h*.27);
  let t0=null,since=0;
  const frame=(ts)=>{ if(t0==null)t0=ts; const el=ts-t0; cfx.clearRect(0,0,w,h);
    since+=16; if(el<1700&&since>260){ since=0; burst(w*(.15+Math.random()*.7),h*(.12+Math.random()*.4)); }
    for(let i=parts.length-1;i>=0;i--){ const p=parts[i]; p.vy+=.05*dpr; p.vx*=.985; p.vy*=.985;
      p.x+=p.vx; p.y+=p.vy; p.life-=.012; if(p.life<=0){parts.splice(i,1);continue;}
      cfx.globalAlpha=Math.max(0,p.life); cfx.fillStyle=p.color;
      cfx.beginPath(); cfx.arc(p.x,p.y,p.size,0,7); cfx.fill(); }
    cfx.globalAlpha=1;
    if(el<2600||parts.length>0) cfRAF=requestAnimationFrame(frame);
    else cfc.classList.remove('on');
  };
  cfRAF=requestAnimationFrame(frame);
}

let calibrated=false;   // 표정 맞추기는 세션당 1회만(종목 바꿔도 재측정 안 함)
function bestFor(id){ try{ const v=localStorage.getItem('fl_best_'+id); return v?parseFloat(v):null; }catch(e){ return null; } }
function isUnlocked(i){ return i===0 || bestFor(EVENTS[i-1].id)!=null; }   // 직전 종목 완주 시 해금
function medalForEv(ev,t){ return t<ev.gold?'🥇':(t<ev.silver?'🥈':'🥉'); }
function renderEventCards(){
  const wrap=$("eventCards"); wrap.innerHTML='';
  EVENTS.forEach((ev,i)=>{
    const unlocked=isUnlocked(i), best=bestFor(ev.id), diff='★'.repeat(i+1);
    let rec;
    if(!unlocked) rec='🔒 '+EVENTS[i-1].name+' 완주하면 열려요';
    else if(best!=null) rec='내 최고 '+best.toFixed(2)+'초 '+medalForEv(ev,best);
    else rec='첫 도전을 기다려요';
    const c=document.createElement('div');
    c.className='ev-card'+(unlocked?'':' locked');
    c.innerHTML='<div class="ev-emoji">'+ev.emoji+'</div><div class="ev-main">'+
      '<div class="ev-name">'+ev.name+'<span class="ev-diff">'+diff+'</span></div>'+
      '<div class="ev-sub">'+ev.dist+'m</div><div class="ev-rec">'+rec+'</div></div>';
    if(unlocked) c.addEventListener('click', ()=>pickEvent(ev));
    wrap.appendChild(c);
  });
}
function goSelect(){ renderEventCards(); $("selErr").style.display='none'; show('select'); }
function pickEvent(ev){ curEvent=ev; beginEvent(); }
async function beginEvent(){
  const err=$("selErr"); err.style.display='none';
  try{
    if(!faceLM) await loadModel();
    $("loadText").textContent='카메라를 켜는 중…';
    if(!stream) await startCamera(calVideo);
    $("loading").classList.remove('active');
    if(!calibrated) runCalibration(); else startGame();   // 첫 회만 표정 맞추기
  }catch(e){
    $("loading").classList.remove('active'); console.error(e);
    let msg='오류가 발생했어요: '+(e.message||e);
    if(e.name==='NotAllowedError') msg='카메라 권한이 필요해요. 브라우저 설정에서 허용해 주세요.';
    if(e.name==='NotFoundError') msg='카메라를 찾을 수 없어요.';
    err.textContent=msg; err.style.display='block';
  }
}

// ============================================================
//  이벤트
// ============================================================
$("startBtn").addEventListener('click', ()=>{ goSelect(); });   // 시작 → 종목 선택
$("selBack").addEventListener('click', ()=>{ stopCamera(); show('intro'); updateStreakIntro(); });
$("calSkip").addEventListener('click', ()=>{ if(calRAF)cancelAnimationFrame(calRAF); calibrated=true; startGame(); });
$("gExit").addEventListener('click', ()=>{ if(G)G.running=false; bgmStop(); goSelect(); });   // 게임 중 ‹ → 종목 선택(카메라 유지)
$("gMute").addEventListener('click', ()=>{ muted=!muted; $("gMute").textContent=muted?'🔇':'🔊'; if(master)master.gain.value=muted?0:.5; });
$("againBtn").addEventListener('click', ()=>{ if(actx&&actx.state==='suspended')actx.resume(); startGame(); });   // 같은 종목 다시
$("homeBtn").addEventListener('click', ()=>{ goSelect(); });   // 결과 → 종목 선택

updateStreakIntro();   // 로드 시 streak 배지 표시
window.__fl={ CAL, startGame, EVENTS, get curEvent(){return curEvent;}, set curEvent(v){curEvent=v;}, get G(){return G;} };
</script>
